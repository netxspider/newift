<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><title>Newsletter form</title></head>
  <body>
    <form name="newsletter" method="POST" data-netlify="true" data-netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="newsletter">
      <p style="position:absolute;overflow:hidden;clip:rect(0 0 0 0);height:1px;width:1px;margin:-1px;padding:0;border:0">
        <label>Leave this field empty <input name="bot-field"></label>
      </p>
      <label>Email <input type="email" name="email"></label>
      <label>Consent <input type="checkbox" name="consent" value="agreed"></label>
      <button type="submit">Subscribe</button>
    </form>
  </body>
</html>
